<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="a developer blog of johan nordin covering dotnet .net azure" />
		<link rel="alternate" type="application/rss+xml" title="nordin.work RSS Feed" href="/rss.xml" />
		<script>
			// Apply stored theme before first paint to avoid flash
			(function() {
				var stored = localStorage.getItem('color-scheme');
				if (stored === 'light') document.documentElement.classList.add('light');
				// dark is default — no class needed
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
